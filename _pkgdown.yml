url: https://jdenn0514.github.io/surveytidy/

template:
  bootstrap: 5
  bslib:
    font_scale: 1.0
    base_font: {google: "Roboto"}
    code_font: {google: "Inter"}
    heading_font: {google: "Roboto"}
    bg: "#fcfbf9"         # lighten springwood background
    fg: "#000000"         # contrast ratio: 15.76 for text
    primary: "#3399AA"    # teal primary
    navbar-bg: "#CCEEEE"  # light teal tint
    navbar-light-hover-color: "#3399AA"

home:
  title: "surveytidy — Tidy dplyr/tidyr Verbs for Survey Design Objects"
  description: >
    dplyr and tidyr verbs for surveycore survey design objects.
    filter() uses domain estimation so variance estimates stay correct.

navbar:
  type: "light"
  bg: "#CCEEEE"  # must match navbar-bg
  pill-active: "#000000"
  structure:
    left:  [intro, reference, news]
    right: [github]
  components:
    github:
      icon: fab fa-github
      href: https://github.com/JDenn0514/surveytidy

reference:
  - title: "Data frame verbs"

  - subtitle: "Rows"
    desc: >
      `filter()`, `filter_out()`, and `drop_na()` use **domain estimation** —
      rows are marked in or out of the analysis domain without being removed,
      so variance estimates stay correct. Physical row removal (`subset()`,
      `slice_*()`) is also available but issues a warning because removing rows
      can bias variance estimates.
    contents:
      - filter
      - distinct
      - drop_na
      - arrange
      - slice
      - subset.survey_base

  - subtitle: "Columns"
    desc: >
      Select, reorder, rename, create, extract, and inspect columns. Design
      variables (weights, strata, PSU, FPC) are always retained even when not
      explicitly selected. `rename()` automatically updates the survey design
      specification and variable metadata to match the new name.
    contents:
      - select
      - relocate
      - rename
      - mutate
      - pull
      - glimpse

  - subtitle: "Groups"
    desc: >
      `group_by()` stores grouping columns on the survey object for use by
      grouped operations like `mutate()`. `rowwise()` enables row-by-row
      computation. Unlike dplyr, the underlying data is not modified — groups
      are stored on the survey object and applied when needed.
    contents:
      - group_by
      - rowwise

  - subtitle: "Joins"
    desc: >
      Join a survey design object with a plain data frame. `left_join()` adds
      lookup columns without changing row count. `semi_join()` and `anti_join()`
      are domain-aware: unmatched rows are marked out-of-domain rather than
      removed, preserving variance estimation validity. `inner_join()` defaults
      to domain-aware mode and supports an explicit `.domain_aware = FALSE`
      for physical row removal. `right_join()`, `full_join()`, and `bind_rows()`
      always error — they would add rows with missing design variables.
    contents:
      - left_join
      - semi_join
      - inner_join
      - bind_cols
      - right_join
      - bind_rows

  - subtitle: "Predicates"
    desc: >
      Test the current grouping and rowwise state of a survey design object.
      These predicates are designed for use by estimation functions in Phase 1.
    contents:
      - is_rowwise
      - is_grouped

  - title: "Recoding"
    desc: >
      Survey-aware versions of dplyr's recoding and conditional functions.
      When called with `.label`, `.value_labels`, `.factor`, or `.description`,
      these functions automatically propagate label metadata into `@metadata`
      via `mutate()`. When called without these arguments, the output is
      identical to the corresponding dplyr function.
    contents:
      - case_when
      - replace_when
      - if_else
      - na_if
      - recode_values
      - replace_values

  - title: "Transformation"
    desc: >
      Vector-level transformation functions for common survey variable
      operations. These functions operate on plain R vectors and integrate with
      `mutate()` via the `surveytidy_recode` attribute protocol, automatically
      recording transformation metadata in `@metadata@transformations`.
    contents:
      - make_factor
      - make_dicho
      - make_binary
      - make_rev
      - make_flip
      - row_means
      - row_sums
